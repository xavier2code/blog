<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    
    <!-- Google Fonts: Playfair Display + Noto Serif SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://example.com/main.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="https://example.com" class="nav-link ">HOME</a>
                <a href="https://example.com/archives" class="nav-link ">ARCHIVE</a>
                <a href="https://example.com/about" class="nav-link ">ABOUT</a>
                <a href="https://example.com/contact" class="nav-link ">CONTACT</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        
<article class="post-layout">
    <header class="post-header">
        
        <h1>Hello World</h1>
        <div class="post-meta">
            <time datetime="2026-03-24">March 24, 2026</time>
            
        </div>
    </header>
    
    <div class="post-content">
        <p>Welcome to my new blog powered by Zola and x-theme!</p>

    </div>
    
    <nav class="post-nav">
        
        
    </nav>
</article>

    </main>

    <!-- Marquee Ticker -->
    
    <div class="marquee">
        <div class="marquee-content">
            <span>★ WELCOME TO MY BLOG ★</span>
            <span aria-hidden="true">★ WELCOME TO MY BLOG ★</span>
        </div>
    </div>
    

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 My Blog. Built with Zola.</p>
            <div class="social-links">
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
                <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
            </div>
        </div>
    </footer>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('.nav-links');
    
    if (toggle && links) {
        toggle.addEventListener('click', function() {
            toggle.classList.toggle('open');
            links.classList.toggle('open');
        });
    }
});
</script>
</body>
</html>
